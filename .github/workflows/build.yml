name: Build IPK & APK

on:
  push:
    tags: [ "v*" ]
  
  # 👇 定制化你的“发版表单”
  workflow_dispatch:
    inputs:
      version:
        description: '📌 发布版本号 (例如: v1.0.3)'
        required: true
        default: 'v1.0.3'
      advantages:
        description: '✨ 核心优势'
        required: false
        default: '开箱即用，「纯净·安全·零破坏」的网络配置向导，化繁为简，实现一键化配置与最小干预部署。'
      instructions:
        description: '📖 软件操作说明'
        required: false
        default: '下载对应系统的安装包，传至路由器 /tmp 目录后，使用 opkg 或 apk 命令进行安装。安装后重启 rpcd 服务即可在菜单中看到 NetWiz。'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    strategy:
      matrix:
        sdk_version: [ "x86_64-23.05.5", "x86_64-snapshot" ]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build LuCI package
        uses: sbwml/openwrt-gh-action-sdk@main   
        env:
          ARCH: ${{ matrix.sdk_version }}
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-netwiz-${{ matrix.sdk_version }}
          path: bin/packages/*/*/luci-app-netwiz*.*pk
          compression-level: 0 

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          # 👇 自动排版魔法：把你的输入自动组合成高颜值的排版
          body: |
            ### ✨ 核心优势
            ${{ github.event.inputs.advantages || '提供纯净、稳定、极简的网络配置体验。' }}
            
            ### 📖 软件操作说明
            ${{ github.event.inputs.instructions || '请下载下方对应的 .ipk 或 .apk 安装包进行部署。' }}
            
            ---
            *📦 支持 OpenWrt 23.05 (ipk) 与 25.x (apk) 全架构跨版本安装。*
          files: |
            bin/**/luci-app-netwiz*.ipk
            bin/**/luci-app-netwiz*.apk
          generate_release_notes: false
