name: NetWiz 自动编译与发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: '🔖 本次发布的版本号 (必须以v开头，例如 v1.0.9)'
        required: true
        default: 'v1.0.9'
      highlights:
        description: '✨ 更新说明 (支持 Markdown)'
        required: false
        default: '常规维护与稳定性更新。'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk_version: [ "x86_64-23.05.5", "x86_64-snapshot" ]
        
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 自动注入版本号到 JS 前端
        run: |
          echo "正在将版本号自动替换为: ${{ github.event.inputs.version }}"
          sed -i "s/var CURRENT_VERSION = '.*';/var CURRENT_VERSION = '${{ github.event.inputs.version }}';/g" luci-app-netwiz/root/www/luci-static/resources/view/netwiz.js

      - name: 编译 LuCI 插件
        uses: sbwml/openwrt-gh-action-sdk@main   
        env:
          ARCH: ${{ matrix.sdk_version }}
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: 提取并重命名安装包
        run: |
          mkdir -p release_pkgs
          find bin/ -name "luci-app-netwiz*.ipk" -exec cp {} release_pkgs/luci-app-netwiz.ipk \;
          find bin/ -name "luci-app-netwiz*.apk" -exec cp {} release_pkgs/luci-app-netwiz.apk \;

      - name: 上传编译产物到云端
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.sdk_version }}
          path: release_pkgs/*
          compression-level: 0 

  release:
    needs: build 
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: 下载所有架构的编译产物
        uses: actions/download-artifact@v4
        with:
          path: final_release
          merge-multiple: true 

      - name: 自动创建 GitHub Release 发布页
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: NetWiz ${{ github.event.inputs.version }} 极速安装版
          body: |
            ### ✨ 最新版发布
            ${{ github.event.inputs.highlights }}
            
            ---
            
            ### 🚀 全平台一键极速安装
            无论你的路由器是 OpenWrt/ImmortalWrt 23.05 还是 25.x，请使用 SSH 登录路由器终端，直接复制并运行下方代码：
            
            ```bash
            wget -qO- [https://raw.githubusercontent.com/$](https://raw.githubusercontent.com/$){{ github.repository }}/master/install.sh | sh
            ```
          files: final_release/*
          generate_release_notes: false
