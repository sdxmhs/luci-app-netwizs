name: luci-app-netwiz Build IPK & APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '🔖 本次发布的版本号 (必须以v开头，例如 v1.0.9)'
        required: true
        default: 'v1.0.9'
      highlights:
        description: '✨ 更新说明 (支持 Markdown)'
        required: false
        default: '常规维护与稳定性更新'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk_version: [ "x86_64-23.05.5", "x86_64-snapshot" ]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Auto Inject Version into JS
        run: |
          echo "正在将版本号自动替换为: ${{ github.event.inputs.version }}"
          # 请把下面这行的路径，换成你仓库里 netwiz.js 的真实路径！
          # LuCI 插件通常在：htdocs/luci-static/resources/view/netwiz/xxxx.js
          sed -i "s/var CURRENT_VERSION = '.*';/var CURRENT_VERSION = '${{ github.event.inputs.version }}';/g" htdocs/luci-static/resources/view/netwiz.js

      - name: Build LuCI package
        uses: sbwml/openwrt-gh-action-sdk@main   
        env:
          ARCH: ${{ matrix.sdk_version }}
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: Prepare Fixed-Name Packages
        run: |
          mkdir -p release_pkgs
          find bin/ -name "luci-app-netwiz*.ipk" -exec cp {} release_pkgs/luci-app-netwiz.ipk \;
          find bin/ -name "luci-app-netwiz*.apk" -exec cp {} release_pkgs/luci-app-netwiz.apk \;

      - name: Upload Artifacts to Cloud
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.sdk_version }}
          path: release_pkgs/*
          compression-level: 0 

  release:
    needs: build 
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_release
          merge-multiple: true 

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 自动读取你填写的版本号，生成对应的标签和炫酷标题
          tag_name: ${{ github.event.inputs.version }}
          name: NetWiz ${{ github.event.inputs.version }} 极速安装版
          body: |
            ### ✨ 最新版发布
            ${{ github.event.inputs.highlights }}
            
            ---
            
            ### 🚀 全平台一键极速安装
            无论你的路由器是 OpenWrt/ImmortalWrt 23.05 还是 25.x，请使用 SSH 登录路由器终端，直接复制并运行下方代码：
            
            ```bash
            wget -qO- https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | sh
            ```
          files: final_release/*
          generate_release_notes: false
