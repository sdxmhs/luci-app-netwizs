name: Build IPK

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build LuCI ipk
        uses: sbwml/openwrt-gh-action-sdk@master
        env:
          ARCH: x86-64-23.05.4   # 使用官方精确镜像标签
          FEEDNAME: packages
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-netwiz
          path: bin/packages/*/packages/luci-app-netwiz*.ipk
          compression-level: 0
