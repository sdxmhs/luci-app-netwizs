name: Build IPK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build LuCI ipk
        uses: sbwml/openwrt-gh-action-sdk@master
        env:
          ARCH: x86_64-23.05 # 使用通用 x86_64 SDK 编译，产物是 all 架构，全通杀
          FEEDNAME: packages
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: luci-app-netwiz
          path: bin/packages/*/packages/luci-app-netwiz*.ipk
